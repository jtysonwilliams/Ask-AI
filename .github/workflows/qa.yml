name: QA

on:
  push:
    branches: [main]
  pull_request:

jobs:
  canonical:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run canonical-requirements linter
        run: node scripts/qa-canonical.mjs
